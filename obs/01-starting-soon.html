<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KP · Starting Soon</title>
<link rel="stylesheet" href="ledge.css">
</head>
<body class="with-bg">
<div id="root" style="position:absolute;inset:0"></div>
<script src="ledge.js"></script>
<script>
  const root = document.getElementById('root');
  LedgeWatch.rooftop(root);
  LedgeWatch.topStrip(root);

  // Big ransom-note STARTING with a live countdown
  const typoEl = LedgeWatch.typo(root, 'STARTING', [
    '◆ ◆ ◆  begins in 05:00  ◆ ◆ ◆',
    'subject approaching the ledge. do not adjust your set.',
  ], { logo: 'assets/logo.png' });
  // Wire up countdown into the first sub line
  let t = 5 * 60;
  const pad = (n) => String(n).padStart(2, '0');
  const line1 = typoEl.querySelector('.sub div:first-child');
  setInterval(() => {
    if (t > 0) t--;
    const m = Math.floor(t/60), s = t % 60;
    line1.textContent = `◆ ◆ ◆  begins in ${pad(m)}:${pad(s)}  ◆ ◆ ◆`;
  }, 1000);

  LedgeWatch.ticker(root);
</script>
</body>
</html>
