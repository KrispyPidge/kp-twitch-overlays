<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KrispyPidgeon — Overlay Concepts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Rubik+Mono+One&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0812;
    color: #e8e4f0;
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
  }
  #root { width: 100vw; height: 100vh; overflow: hidden; }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- Tweak defaults (editable via Tweaks panel in toolbar) -->
  <script>
    window.__TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "direction": "D",
      "scene": "just-chatting",
      "goalPercent": 65,
      "theme": "dark",
      "palette": "dusk"
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/shared.jsx"></script>
  <script type="text/babel" src="src/pigeons.jsx"></script>
  <script type="text/babel" src="src/direction-a.jsx"></script>
  <script type="text/babel" src="src/direction-b.jsx"></script>
  <script type="text/babel" src="src/direction-c.jsx"></script>
  <script type="text/babel" src="src/direction-d.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
